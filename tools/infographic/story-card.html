<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Unreel Estate — Story Card</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C4956A;
    --gold-light: #E0C9A8;
    --bg: #0D0B09;
    --text: #FAF7F2;
  }

  body {
    width: 1080px;
    height: 1920px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Full bleed photo — top 65% */
  .photo {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 65%;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Gradient from photo into dark bottom */
  .photo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13,11,9,0.15) 0%,
      rgba(13,11,9,0.0) 40%,
      rgba(13,11,9,0.7) 75%,
      rgba(13,11,9,1) 100%
    );
  }

  /* Logo top left */
  .logo-wrap {
    position: absolute;
    top: 56px;
    left: 72px;
    z-index: 10;
  }

  .logo-wrap img {
    height: 64px;
    width: auto;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5));
  }

  /* For Sale badge top right */
  .badge {
    position: absolute;
    top: 66px;
    right: 72px;
    z-index: 10;
    background: var(--gold);
    color: var(--bg);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 2px;
  }

  /* Bottom content panel */
  .panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40%;
    padding: 0 80px 72px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* Neighborhood */
  .neighborhood {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  /* Address */
  .address {
    font-family: 'Bodoni Moda', serif;
    font-size: 88px;
    font-weight: 700;
    line-height: 1.0;
    color: var(--text);
    margin-bottom: 8px;
  }

  .city {
    font-size: 28px;
    font-weight: 300;
    color: rgba(250,247,242,0.55);
    margin-bottom: 48px;
    letter-spacing: 1px;
  }

  /* Price line */
  .price-line {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 48px;
  }

  .price {
    font-family: 'Bodoni Moda', serif;
    font-size: 96px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -2px;
    line-height: 1;
  }

  .price-sqft {
    font-size: 26px;
    font-weight: 300;
    color: rgba(250,247,242,0.5);
    align-self: flex-end;
    padding-bottom: 8px;
  }

  /* Stats strip */
  .stats {
    display: flex;
    gap: 0;
    margin-bottom: 52px;
    border: 1px solid rgba(196,149,106,0.2);
    border-radius: 4px;
    overflow: hidden;
  }

  .stat {
    flex: 1;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    border-right: 1px solid rgba(196,149,106,0.2);
    background: rgba(255,255,255,0.03);
  }

  .stat:last-child { border-right: none; }

  .stat-value {
    font-family: 'Bodoni Moda', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(250,247,242,0.4);
  }

  /* CTA */
  .cta {
    background: var(--gold);
    border-radius: 4px;
    padding: 40px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta-left {}

  .cta-title {
    font-family: 'Bodoni Moda', serif;
    font-size: 38px;
    font-style: italic;
    color: var(--bg);
    line-height: 1.1;
  }

  .cta-url {
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 2px;
    color: rgba(13,11,9,0.55);
    margin-top: 6px;
  }

  .cta-arrow {
    font-size: 60px;
    color: var(--bg);
    font-weight: 300;
  }
</style>
</head>
<body>

  <!-- FULL BLEED PHOTO -->
  <div class="photo">
    <img src="../../public/gallery/after/exterior.png" alt="Property" />
  </div>

  <!-- LOGO -->
  <div class="logo-wrap">
    <img src="../../public/logo.png" alt="Unreel Estate" />
  </div>

  <!-- BADGE -->
  <div class="badge">For Sale</div>

  <!-- BOTTOM PANEL -->
  <div class="panel">
    <div class="neighborhood">Midtown · Houston</div>
    <div class="address">4521 Oakdale St</div>
    <div class="city">Houston, TX 77004</div>

    <div class="price-line">
      <div class="price">$875,000</div>
      <div class="price-sqft">$312 / sqft</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value">4</div>
        <div class="stat-label">Beds</div>
      </div>
      <div class="stat">
        <div class="stat-value">3.5</div>
        <div class="stat-label">Baths</div>
      </div>
      <div class="stat">
        <div class="stat-value">2,805</div>
        <div class="stat-label">Sqft</div>
      </div>
      <div class="stat">
        <div class="stat-value">2025</div>
        <div class="stat-label">Built</div>
      </div>
    </div>

    <div class="cta">
      <div class="cta-left">
        <div class="cta-title">Book a Private Tour</div>
        <div class="cta-url">unreelestate.com</div>
      </div>
      <div class="cta-arrow">→</div>
    </div>
  </div>

</body>
</html>
